name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies
        if: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/trex dist/
          cp man/trex.1 dist/
          cd dist
          tar czf ../trex-${{ matrix.target }}.tar.gz trex trex.1

      - uses: actions/upload-artifact@v4
        with:
          name: trex-${{ matrix.target }}
          path: trex-${{ matrix.target }}.tar.gz

  package:
    name: Package (.deb / .rpm)
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Download linux tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: trex-*-unknown-linux-gnu
          path: artifacts

      - name: Build .deb
        run: |
          TARGET="${{ matrix.arch == 'amd64' && 'x86_64' || 'aarch64' }}-unknown-linux-gnu"
          VERSION="${GITHUB_REF_NAME#v}"

          mkdir -p deb-pkg/DEBIAN deb-pkg/usr/bin deb-pkg/usr/share/man/man1

          tar -xzf "artifacts/trex-${TARGET}/trex-${TARGET}.tar.gz" -C /tmp
          cp /tmp/trex deb-pkg/usr/bin/
          cp /tmp/trex.1 deb-pkg/usr/share/man/man1/

          cat > deb-pkg/DEBIAN/control <<EOF
Package: trex
Version: ${VERSION}
Architecture: ${{ matrix.arch }}
Maintainer: Taha Sadough <taha@sadough.dev>
Depends: tmux
Section: utils
Priority: optional
Homepage: https://github.com/tahasadough/trex
License: MIT
Description: Tmux Restore Extreme - persist and restore tmux sessions
 Persist your tmux sessions across reboots. Windows, panes,
 layouts, working directories, session options, and running
 commands come back exactly as you left them.
EOF

          dpkg-deb --build deb-pkg "trex_${VERSION}_${{ matrix.arch }}.deb"

      - name: Build .rpm
        run: |
          TARGET="${{ matrix.arch == 'amd64' && 'x86_64' || 'aarch64' }}-unknown-linux-gnu"
          VERSION="${GITHUB_REF_NAME#v}"

          sudo apt-get install -y rpm
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          tar -xzf "artifacts/trex-${TARGET}/trex-${TARGET}.tar.gz" -C /tmp
          cp /tmp/trex rpmbuild/SOURCES/
          cp /tmp/trex.1 rpmbuild/SOURCES/

          ARCH="${{ matrix.arch == 'amd64' && 'x86_64' || 'aarch64' }}"
          cat > rpmbuild/SPECS/trex.spec <<EOF
Name:       trex
Version:    ${VERSION}
Release:    1%{?dist}
Summary:    Tmux Restore Extreme
License:    MIT
URL:        https://github.com/tahasadough/trex
Source0:    trex
Source1:    trex.1
Requires:   tmux

%description
Persist your tmux sessions across reboots.

%install
install -Dm755 %{SOURCE0} %{buildroot}%{_bindir}/trex
install -Dm644 %{SOURCE1} %{buildroot}%{_mandir}/man1/trex.1

%files
%{_bindir}/trex
%{_mandir}/man1/trex.1*
EOF

          rpmbuild -bb --define "_topdir ${PWD}/rpmbuild" \
            --target "${ARCH}" \
            rpmbuild/SPECS/trex.spec

          cp rpmbuild/RPMS/${ARCH}/trex-${VERSION}-1.*.rpm \
            "trex-${VERSION}-1.${{ matrix.arch }}.rpm"

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: |
            trex_*.deb
            trex-*.rpm

  release:
    name: Create Release
    needs: [build, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' \) -exec sh -c '
            for f do
              sha256sum "$f"
            done
          ' {} + > artifacts/SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/SHA256SUMS
          generate_release_notes: true
